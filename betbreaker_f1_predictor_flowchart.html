<script>
const N={
jolpica:{title:'Jolpica API',type:'Sorgente Esterna',file:'jolpi.ca/ergast/f1/{year}/{round}/',desc:'REST API fork di Ergast, aggiornata entro 3h dalla fine di ogni gara. Fornisce risultati storici F1 dal 1950 a oggi: posizioni, qualifiche, grid, costruttori, status DNF. Cache locale JSON per evitare rate limiting.',methods:['fetch_season(year, through_round) → list[RaceResult]','fetch_round(year, round) → list[DriverResult]','fetch_qualifying(year, round) → list[QualResult]','cache_to_disk(data, cache_dir)'],inputs:['year: int (es. 2026)','round: int','through_round: int (per training walk-forward)'],outputs:['list[RaceResult]: {race_id, year, round, circuit_type, drivers:[{name, team, position, grid, laps_completed, dnf_reason}]}']},
tracing:{title:'TracingInsights CSV',type:'Sorgente Esterna',file:'github.com/TracingInsights/RaceData — git clone data/racedata',desc:'Dataset CSV lap-by-lap dal 2018 a oggi, aggiornato via GitHub Actions. Include: results, qualifying, lap_times, pit_stops, safety_cars, red_flags. Unica fonte per telemetria stint e compound gomme.',methods:['pd.read_csv(racedata/{year}/{race}/laps.csv)','parse safety_cars.csv → SC events per lap','parse pit_stops.csv → stint start/end','filter_valid_laps(df) → rimuove in/out lap e SC'],inputs:['base_path: Path (data/racedata/)','year: int','race_id: str (es. "bahrain")'],outputs:['DataFrame: {driver, team, lap, lap_time, compound, tire_life, sector1, sector2, sector3, is_personal_best, pit_in_lap}']},
odds_src:{title:'The Odds API',type:'Sorgente Esterna',file:'theoddsapi.com — key: THE_ODDS_API_KEY (env)',desc:'Quote storiche Pinnacle per mercati F1. Usate esclusivamente per Layer 4 Isotonic Calibration. Free tier: 500 req/mese. Target storico: 2023-2025 (~70 gare × ~20 piloti = >1000 osservazioni per calibratore).',methods:['GET /v4/sports/motorsport_formula_one/odds?bookmakers=pinnacle','GET /v4/historical/...?date=ISO_TIMESTAMP','devig_power(odds_list) → fair_probs (brentq root-finding)'],inputs:['THE_ODDS_API_KEY env','regions=eu, bookmakers=pinnacle','market: "h2h" | "outrights"','timestamp: T-3h post-qualifiche (più predittivo)'],outputs:['list[OddsRecord]: {driver, odd_decimal, P_implied_novig (Power devig), market, timestamp, hours_to_race}']},
openf1:{title:'OpenF1 API',type:'Sorgente Esterna',file:'openf1.org — usato SOLO da core/f1_api.py (web app)',desc:'API live per FP1/FP2/FP3/Q. Bypassa completamente la training pipeline. Usata dalla web app per feature engineering in-session (pace FP, sector times). Polling dual-speed: 3s live, 8s storico.',methods:['get_sessions(year, round) → list[SessionInfo]','get_lap_times(session_key, driver_number) → list[Lap]','get_driver_info(session_key) → list[DriverInfo]','get_car_data(session_key) → telemetria velocità'],inputs:['session_key: str (live, es. "9159")','driver_number: int','year+round (modalità storica)'],outputs:['SessionData: {drivers:[{name, team, last_lap, gap_leader, sector1-3}]}','DriverStanding: {name, team, points, position}']},
loader_jolpica:{title:'loader_jolpica.py',type:'Data Loader',file:'f1_predictor/data/loader_jolpica.py',desc:'Scarica e normalizza risultati da Jolpica con cache locale JSON. Mappa ogni circuito al circuit_type (STREET/HIGH_SPEED/HIGH_DOWNFORCE/MIXED) per il TTT condizionato. Gestisce rate limiting con retry e backoff.',methods:['fetch_season(year, through_round) → list[dict]','fetch_round(year, round) → list[dict]','_map_circuit_type(circuit_id) → CircuitType','cache_to_disk(data, key) → Path','load_from_cache(key) → list[dict] | None'],inputs:['years: range(2019, 2027)','through_round: int (es. 5 per R1-R5)','cache_dir: Path (default data/cache_jolpica/)'],outputs:['list[RaceResult dicts]: {race_id, year, round, circuit_type: STREET|HIGH_SPEED|HIGH_DOWNFORCE|MIXED, drivers:[{name, team, position, grid, laps_completed, dnf_reason}]}']},
loader_tracing:{title:'loader_tracinginsights.py',type:'Data Loader',file:'f1_predictor/data/loader_tracinginsights.py',desc:'Legge CSV lap-by-lap da RaceData. Calcola pace_rel normalizzato per alimentare il Kalman Filter. Filtra giri validi (no pit in/out, no safety car, no outlap). Costruisce stints per modello degrado gomme.',methods:['load_laps(year, race_id) → DataFrame','compute_pace_rel(df) → DataFrame (aggiunge colonna pace_rel)','filter_valid_laps(df) → DataFrame','get_stint_data(df) → list[Stint]','load_safety_car_events(year, race_id) → list[SCEvent]'],inputs:['base_path: Path (data/racedata/)','year: int','race_id: str'],outputs:['DataFrame: {team, driver, lap, pace_rel=(lap_t−median_field)/median_field, compound, tire_life, stint_n, is_valid_lap}']},
loader_odds:{title:'loader_odds.py',type:'Data Loader',file:'f1_predictor/data/loader_odds.py',desc:'Fetcha quote da The Odds API e applica devig Power method (brentq). Salva snapshot T-3h post-qualifiche: il timestamp più predittivo per calibrazione. Layer 4 richiede ≥100 record: fetch 2023-2025 per attivarlo.',methods:['fetch_event_odds(event_id, market) → list[OddsRecord]','devig_power(odds: list[float]) → list[float]  # sum(p^k)=1','get_snapshot_t3h(event_id) → list[OddsRecord]','save_to_db(db, records)'],inputs:['event_id: str (es. "2025_bahrain")','market: "h2h" | "podium"','THE_ODDS_API_KEY env variable'],outputs:['list[OddsRecord]: {driver, odd_decimal, P_implied_novig, market, timestamp, hours_to_race}']},
f1api:{title:'core/f1_api.py',type:'Data Loader',file:'core/f1_api.py — usato SOLO dalla web app, non dal training',desc:'Client duale OpenF1 + Jolpica per la web app. Bypass totale della training pipeline. Polling 3s live / 8s storico per le tab Sessione Live e Gara Completa.',methods:['get_live_timing(session_key) → SessionData','get_session_data(year, round, session) → SessionData','get_standings(year) → list[DriverStanding]','poll_with_fallback(session_key, interval_s=3)'],inputs:['session_key: str (OpenF1, live)','year: int, round: int (Jolpica, storico)'],outputs:['SessionData: {drivers:[{name, team, last_lap, gap_to_leader, sector1, sector2, sector3}]}','DriverStanding: {name, team, points, position}']},
adapter:{title:'DataAdapter — data/adapter.py',type:'Adattatore',file:'f1_predictor/data/adapter.py',desc:'Converte output dei loader nel formato list[dict] che F1PredictionPipeline.load_race_data() si aspetta. Gestisce merge tra dati Jolpica (risultati) e TracingInsights (lap telemetry). Fallback sintetico se loader non disponibili.',methods:['to_pipeline_format(jolpica_data, tracing_data, odds_data=None) → list[dict]','merge_sources(jolpica, tracing) → list[dict]','_synthetic_fallback(n_races=500) → list[dict]','validate_record(record) → bool'],inputs:['jolpica_data: list[RaceResult]','tracing_data: DataFrame','odds_data: list[OddsRecord] (opzionale, solo per Layer 4)'],outputs:['list[dict]: {race_id, year, round, circuit_type, drivers:[{name, team, position, grid, pace_rel, tire_stints}], odds:[{driver, P_implied}]}']},
l1a:{title:'Layer 1a — Driver Skill Rating',type:'ML Layer',file:'f1_predictor/models/driver_skill.py · class DriverSkillModel',desc:'TrueSkill Through Time (Dangauthier et al. NeurIPS). Modella skill pilota come processo gaussiano N(μ,σ²) che evolve nel tempo. Rating separato per 4 circuit_type. Rif: van Kesteren & Bergkamp (2023).',methods:['fit(races: list[dict]) → self','update(race_result: dict)  # bayesian belief update post-gara','get_all_ratings() → dict  # serializzato su MongoDB','get_rating(driver, circuit_type) → TTTRating(μ,σ)','predict_h2h(d1,d2,circuit_type) → P(d1>d2) via Φ((μ1−μ2)/√(2β²+σ1²+σ2²))'],inputs:['list[RaceResult]: driver, position, circuit_type','Hyperparams: mu=25.0, sigma=8.333, beta=4.167, tau=0.1 (process noise)'],outputs:['dict {driver → {circuit_type → TTTRating(μ,σ)}}','→ serializzato: driver_ratings.pkl in MongoDB GridFS']},
l1b:{title:'Layer 1b — Machine Pace Model',type:'ML Layer',file:'f1_predictor/models/machine_pace.py · class MachinePaceModel',desc:'Kalman Filter per tracciare il pace macchina (team) durante la stagione come processo state-space. inject_upgrade() aumenta covarianza P_k per permettere aggiornamento rapido dopo pacchetti tecnici. Rif: "State-Space Tire Degradation" arXiv 2025.',methods:['fit(lap_data: DataFrame) → self','predict_step() → (x_pred: float, P_pred: float)','update_step(observation: float) → (x_est: float, P_cov: float)','inject_upgrade(team: str, magnitude=0.1)  # aumenta P_k','get_all_states() → dict  # serializzato su MongoDB'],inputs:['DataFrame: pace_rel, team, race_id, compound, tire_life','Hyperparams: Q_noise=0.001 (process noise), R_obs=0.01 (obs noise)'],outputs:['dict {team → KalmanState(x_est, P_cov, Q, R)}','→ serializzato: kalman_states.pkl in MongoDB GridFS']},
l2:{title:'Layer 2 — Bayesian Race Simulator',type:'ML Layer',file:'f1_predictor/models/bayesian_race.py · class BayesianRaceSimulator',desc:'Monte Carlo 50.000 simulazioni. Modella: degrado gomme (state-space Bayesiano), safety car (frequenza storica per circuito), DNF per componente ICE/MGU-K, lap-1 chaos. Output: matrice 20×20 P(posizione). Rif: Heilmeier et al. (2020).',methods:['simulate_race(drivers, circuit_type, grid) → dict','position_distribution(driver, ratings, states) → {pos→prob}','_simulate_one(drivers, params) → list[finishing_order]','_simulate_tire_deg(compound, life, circuit_type) → delta_pace','_sample_safety_car(circuit_type, lap) → bool'],inputs:['driver_ratings: dict (da L1a)','kalman_states: dict (da L1b)','circuit_type: str, grid_positions: list[str]','n_simulations: int = 50000'],outputs:['dict {driver → {position → P(pos)}}  # matrice 20×20','P(d1 finisce davanti a d2) = Σ_{p1<p2} P(d1=p1)·P(d2=p2)']},
l3:{title:'Layer 3 — Ridge Ensemble',type:'ML Layer',file:'f1_predictor/models/ensemble.py · class RidgeEnsemble',desc:'Ridge Regression meta-learner (α=10.0) addestrato walk-forward su output L1a+L1b+L2 + 11 feature differenziali. Blend finale: 30% Ridge + 70% Monte Carlo (preserva calibrazione bayesiana). Rif: van Kesteren & Bergkamp (2023), Walsh & Joshi (2023).',methods:['fit(X: ndarray, y: ndarray[0|1]) → self  # walk-forward su stagioni storiche','predict_proba(features: ndarray) → p_ridge: float','blend(p_ridge, p_mc, w=0.30) → p_blend  # 30/70 blend','_build_features(f1,f2,p_ttt,p_mc) → ndarray[15]','get_feature_names() → list[str]'],inputs:['X: features shape=(N,15): [p_ttt, p_mc, diff_feat×11, p_ttt−0.5, p_mc−0.5]','y: outcomes array[0|1]','alpha=10.0 (L2 Ridge regularization)'],outputs:['coef_: ndarray[15], intercept_: float','p_blend = 0.30·p_ridge + 0.70·p_mc','→ serializzato: ridge_ensemble.pkl in MongoDB GridFS']},
l4:{title:'Layer 4 — Isotonic Calibration',type:'ML Layer',file:'f1_predictor/calibration/isotonic.py · class IsotonicCalibrator',desc:'Isotonic Regression su coppie (P_model, outcome). Richiede ≥100 osservazioni (attivato con storico Pinnacle 2023-2025). Corregge bias sistematici vs frequenza osservata. Edge = P_cal − P_pinnacle_novig. Rif: Walsh & Joshi (2023), Štrumbelj (2014).',methods:['fit(p_model: ndarray, outcomes: ndarray) → self','transform(p_model: float) → p_calibrated: float','compute_edge(p_model, p_pinnacle) → edge: float','edge_significance(edges, outcomes, n_perm=10000) → {roi, p_value, significant}'],inputs:['p_model: ndarray[0..1] (output blend Layer 3)','outcomes: ndarray[0|1] (esiti storici gare)','p_pinnacle_novig: ndarray[0..1] (da devig Power brentq)'],outputs:['p_calibrated: float [0..1]','edge = p_calibrated − p_pinnacle_novig  # >0 → valore atteso positivo','→ serializzato: isotonic_calibrator.pkl in MongoDB GridFS']},
validation:{title:'WalkForwardValidator + BacktestEngine',type:'Validazione',file:'f1_predictor/validation/walk_forward.py + backtesting.py',desc:'Walk-forward rigoroso: train 2019-2021→test 2022, 2019-2022→test 2023, ecc. Zero look-ahead, embargo 1 gara. Permutation test 10k iterazioni per edge significance. Go/No-Go decision prima di upload su MongoDB.',methods:['run(train_years, test_years, embargo=1) → WFMetrics','compute_metrics(preds, actuals) → Metrics (Brier, τ, ECE)','permutation_test(edges, outcomes, n=10000) → p_value','chow_test(params_by_year) → stability_bool','check_go_nogo(metrics) → bool  # True = procedi con upload'],inputs:['pipeline: F1PredictionPipeline','train_years: range(2019,2022)','test_years: range(2022,2026)','embargo_races: int = 1'],outputs:['WFMetrics: {brier<0.20✓, kendall_tau>0.45✓, ece<0.05✓, roi>0%✓, sharpe, max_drawdown<20%✓}','Go/No-Go → se True, salva artefatti su MongoDB']},
mongodb:{title:'MongoDB Atlas GridFS — db_artifacts.py',type:'Storage',file:'core/db_artifacts.py · usato da ENTRAMBI training locale e Streamlit Cloud',desc:'Artifact store condiviso. Serializzazione pickle+gzip (~3-6MB totali). GridFS per file >16MB. Versioning con puntatore "latest" in collection model_versions. Rollback in 1 comando. Connessione via MONGO_URI (env .env locale + Streamlit Secrets).',methods:['save_model_artifacts(db, artifacts_dict, metadata) → version_str','load_latest_model_artifacts(db) → dict | None  # None → fallback sintetico','list_model_versions(db) → list[dict]  # ultime 10 versioni','rollback_to_version(db, version) → bool','_serialize(obj) → bytes  # pickle + gzip compresslevel=6'],inputs:['artifacts_dict: {driver_ratings, kalman_states, ridge_ensemble, isotonic_calibrator}','metadata: {brier, kendall_tau, round, year, n_races, calibrator_fitted}'],outputs:['version: str ("v20260310_1430")','artifacts_dict dopo deserialization (pickle+gzip, 3-6MB)','None se nessun artifact presente → web app usa modello sintetico']},
inference:{title:'AdvancedInferenceEngine',type:'Inference Engine',file:'ml/inference_engine.py · class AdvancedInferenceEngine',desc:'Drop-in replacement per F1MLEngine: stessa interfaccia pubblica → core/analysis.py non cambia. Factory method con fallback graceful a modello sintetico. Caricato via @st.cache_resource all\'avvio Streamlit.',methods:['from_artifacts_dir(db) → AdvancedInferenceEngine | F1MLEngine (fallback)','predict_h2h(f1, f2) → (p_ttt, p_mc, p_ridge, p_final)  # interfaccia compat.','predict_top6(f) → float  # P(posizione ≤ 6) dal Monte Carlo','get_driver_rating(driver, circuit_type) → TTTRating(μ,σ)','feature_importance() → pd.Series  # coeff Ridge normalizzati'],inputs:['artifacts dict (da MongoDB load_latest_model_artifacts)','f1/f2: ndarray[11] (build_driver_features() da core/analysis.py)','driver: str, circuit_type: str'],outputs:['(p_ttt, p_mc, p_ridge, p_final): tuple[float,float,float,float]','edge = p_final − p_pinnacle_novig','Kelly_stake = max(0, edge/(1/p_pinnacle−1)) × 0.25  # quarter Kelly, Baker & McHale 2013']},
webapp:{title:'Streamlit Web App — app.py',type:'Web App',file:'app.py → betbreaker.streamlit.app',desc:'Web app di inferenza. Carica AdvancedInferenceEngine via @st.cache_resource (una volta per istanza). Salva prediction history su MongoDB collection predictions. 6 tab operative.',methods:['get_ml_engine() → AdvancedInferenceEngine (cache_resource)','AnalysisEngine.predict(d1, d2, session_data) → EdgeReport','AnalysisEngine.build_driver_features(driver) → ndarray[11]  # 11 feature: wins%, podium%, pts, cscore, quali_avg, race_avg, form3, form5, circuit_h2h, consistency, constructor_strength','display_edge_report(report) → Streamlit tabs/charts'],inputs:['User: driver names, market selection, FP session data (OpenF1 live)','MongoDB: latest model artifacts (load_latest_model_artifacts)','MongoDB: prediction history (collection: predictions)'],outputs:['EdgeReport: {P_model, P_pinnacle, edge%, Kelly_stake, confidence_interval, market}','Tab Valutazione: P&L curve gara×gara, calibration reliability plot, ECE per bucket','Export CSV: edge report pre-gara con segnali ✓✓/✓/✗']}
};

const typeStyle={
  'Sorgente Esterna':['var(--color-background-info)','var(--color-text-info)'],
  'Data Loader':['var(--color-background-secondary)','var(--color-text-secondary)'],
  'Adattatore':['var(--color-background-secondary)','var(--color-text-secondary)'],
  'ML Layer':['var(--color-background-secondary)','var(--color-text-secondary)'],
  'Validazione':['var(--color-background-warning)','var(--color-text-warning)'],
  'Storage':['var(--color-background-warning)','var(--color-text-warning)'],
  'Inference Engine':['var(--color-background-danger)','var(--color-text-danger)'],
  'Web App':['var(--color-background-success)','var(--color-text-success)']
};

function showNode(id){
  const n=N[id];if(!n)return;
  const [bg,tc]=typeStyle[n.type]||['var(--color-background-secondary)','var(--color-text-secondary)'];
  document.getElementById('dp').innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:6px">
      <div><p class="dt">${n.title} <span class="tg" style="background:${bg};color:${tc}">${n.type}</span></p></div>
      <code class="df">${n.file}</code>
    </div>
    <p class="dd">${n.desc}</p>
    <p class="mh">Metodi principali</p>
    <div class="ml">${n.methods.map(m=>`<div>${m}</div>`).join('')}</div>
    <div class="ig">
      <div class="ic"><div class="il">Input</div><div class="iv">${n.inputs.map(i=>`<div>· ${i}</div>`).join('')}</div></div>
      <div class="ic"><div class="il">Output</div><div class="iv">${n.outputs.map(o=>`<div>· ${o}</div>`).join('')}</div></div>
    </div>`;
}
</script>
