name: Import TracingInsights Data

on:
  workflow_dispatch:
    inputs:
      min_year:
        description: 'Anno minimo da importare (default: 2019)'
        required: false
        default: '2019'
      max_year:
        description: 'Anno massimo da importare (default: anno corrente)'
        required: false
        default: ''
      force:
        description: 'Force re-import (ignora log importazioni precedenti)'
        required: false
        default: 'false'
  schedule:
    - cron: '0 3 * * 3'

env:
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}

jobs:
  # ── Job unico: clone + import lap times ────────────────────────────────
  # NOTA: sync e import devono stare nello stesso job perché i runner
  # GitHub Actions sono efimeri — il filesystem non è condiviso tra job.
  sync-and-import:
    name: Sync TracingInsights & Import to MongoDB
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: MONGODB_URI
    outputs:
      year:     ${{ steps.setup-year.outputs.year }}
      min_year: ${{ steps.setup-year.outputs.min_year }}
      max_year: ${{ steps.setup-year.outputs.max_year }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine year range
        id: setup-year
        env:
          MAX_YEAR_INPUT: ${{ inputs.max_year || '' }}
        run: |
          CURRENT_YEAR=$(date +%Y)
          MAX_YEAR="${MAX_YEAR_INPUT:-$CURRENT_YEAR}"
          MIN_YEAR="${{ inputs.min_year || '2019' }}"
          echo "min_year=$MIN_YEAR" >> $GITHUB_OUTPUT
          echo "max_year=$MAX_YEAR" >> $GITHUB_OUTPUT
          echo "year=$MAX_YEAR" >> $GITHUB_OUTPUT
          echo "Range anni: $MIN_YEAR – $MAX_YEAR"

      - name: Clone TracingInsights RaceData
        run: |
          git clone --depth 1 https://github.com/TracingInsights/RaceData.git data/racedata
          rm -rf data/racedata/.git
          rm -rf data/racedata/.github
          echo "RaceData clonato: $(find data/racedata -name '*.csv' | wc -l) CSV files"
          echo "=== Struttura directory (prime 4 livelli) ==="
          find data/racedata -maxdepth 4 -type d | head -60
          echo "=== File CSV trovati ==="
          find data/racedata -name '*.csv' | head -30

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymongo python-dotenv pandas

      - name: Import lap times → MongoDB
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.force }}" = "true" ]; then FORCE_FLAG="--force"; fi
          python scripts/import_tracinginsights.py \
            --min-year ${{ steps.setup-year.outputs.min_year }} \
            --max-year ${{ steps.setup-year.outputs.max_year }} \
            $FORCE_FLAG
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}

  # ── Job separato: calcolo pace (legge da MongoDB, non dal filesystem) ──
  compute-pace:
    name: Compute Constructor Pace Observations
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: sync-and-import
    environment: MONGODB_URI

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymongo python-dotenv numpy pandas scipy

      - name: Compute pace observations
        run: python scripts/compute_pace_observations.py
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}
          MIN_YEAR: ${{ needs.sync-and-import.outputs.min_year }}
          MAX_YEAR: ${{ needs.sync-and-import.outputs.max_year }}

  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [sync-and-import, compute-pace]
    if: failure()

    steps:
      - name: Create failure summary
        run: |
          echo "## Import Failed" >> $GITHUB_STEP_SUMMARY
          echo "TracingInsights import failed. Check logs for details." >> $GITHUB_STEP_SUMMARY
