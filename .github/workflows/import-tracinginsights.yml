name: Import TracingInsights Data

on:
  workflow_dispatch:
    inputs:
      min_year:
        description: 'Anno minimo da importare (default: 2019)'
        required: false
        default: '2019'
      max_year:
        description: 'Anno massimo da importare (default: 2024)'
        required: false
        default: '2024'
      force:
        description: 'Force re-import'
        required: false
        default: 'false'
  schedule:
    - cron: '0 3 * * 3'

env:
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}

jobs:
  sync-and-import:
    name: Sync & Import TracingInsights to MongoDB
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: MONGODB_URI
    outputs:
      year: ${{ steps.setup-year.outputs.year }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone TracingInsights RaceData
        run: |
          git clone --depth 1 https://github.com/TracingInsights/RaceData.git data/racedata
          rm -rf data/racedata/.git
          rm -rf data/racedata/.github
          echo "RaceData clonato: $(find data/racedata -name '*.csv' | wc -l) CSV files"
          ls -la data/racedata/
          ls -la data/racedata/data/ 2>/dev/null || echo "no data/ subdir"

      - name: Determine year range
        id: setup-year
        run: |
          MIN_YEAR="${{ inputs.min_year || '2019' }}"
          MAX_YEAR="${{ inputs.max_year || '2024' }}"
          echo "min_year=$MIN_YEAR" >> $GITHUB_OUTPUT
          echo "max_year=$MAX_YEAR" >> $GITHUB_OUTPUT
          echo "year=$MAX_YEAR" >> $GITHUB_OUTPUT
          echo "Anni: $MIN_YEAR - $MAX_YEAR"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymongo python-dotenv pandas

      - name: Cleanup old lap times
        run: python scripts/cleanup_old_lap_times.py
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}

      - name: Import lap times → MongoDB
        run: |
          python scripts/import_tracinginsights.py --racedata-path data/racedata --year ${{ steps.setup-year.outputs.max_year }}
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}
          MIN_YEAR: ${{ steps.setup-year.outputs.min_year }}
          MAX_YEAR: ${{ steps.setup-year.outputs.max_year }}
          FORCE: ${{ inputs.force || 'false' }}

      - name: Import qualifying data → MongoDB
        run: |
          python scripts/import_qualifying.py --racedata-path data/racedata --force
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}
          MIN_YEAR: ${{ steps.setup-year.outputs.min_year }}
          MAX_YEAR: ${{ steps.setup-year.outputs.max_year }}

  compute-pace:
    name: Compute Constructor Pace Observations
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: sync-and-import
    environment: MONGODB_URI

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymongo python-dotenv numpy pandas scipy

      - name: Compute pace observations
        run: python scripts/compute_pace_observations.py
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}
          YEAR: ${{ needs.sync-and-import.outputs.year }}

  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [sync-and-import, compute-pace]
    if: failure()

    steps:
      - name: Create failure summary
        run: |
          echo "## Import Failed" >> $GITHUB_STEP_SUMMARY
          echo "TracingInsights import failed. Check logs for details." >> $GITHUB_STEP_SUMMARY
