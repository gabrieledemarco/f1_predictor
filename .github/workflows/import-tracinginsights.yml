name: Import TracingInsights Data

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Year to import (default: current year)'
        required: false
        default: ''
      force:
        description: 'Force re-import'
        required: false
        default: 'false'
  schedule:
    - cron: '0 3 * * 3'

env:
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}

jobs:
  sync-and-import:
    name: Sync & Import TracingInsights to MongoDB
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: MONGODB_URI
    outputs:
      year: ${{ steps.setup-year.outputs.year }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine year
        id: setup-year
        env:
          YEAR: ${{ inputs.year || '' }}
        run: |
          CURRENT_YEAR=$(date +%Y)
          SELECTED_YEAR="${YEAR:-$CURRENT_YEAR}"
          echo "year=$SELECTED_YEAR" >> $GITHUB_OUTPUT
          echo "Anno selezionato: $SELECTED_YEAR"

      - name: Clone TracingInsights RaceData
        run: |
          git clone --depth 1 https://github.com/TracingInsights/RaceData.git data/racedata
          rm -rf data/racedata/.git
          rm -rf data/racedata/.github
          echo "RaceData clonato: $(find data/racedata -name '*.csv' | wc -l) CSV files"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymongo python-dotenv pandas

      - name: Import lap times → MongoDB
        run: python scripts/import_tracinginsights.py
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}
          YEAR: ${{ steps.setup-year.outputs.year }}
          FORCE: ${{ inputs.force || 'false' }}

  compute-pace:
    name: Compute Constructor Pace Observations
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: sync-and-import
    environment: MONGODB_URI

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymongo python-dotenv numpy pandas scipy

      - name: Compute pace observations
        run: python scripts/compute_pace_observations.py
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}
          YEAR: ${{ needs.sync-and-import.outputs.year }}

  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [sync-and-import, compute-pace]
    if: failure()
    
    steps:
      - name: Create failure summary
        run: |
          echo "## Import Failed" >> $GITHUB_STEP_SUMMARY
          echo "TracingInsights import failed. Check logs for details." >> $GITHUB_STEP_SUMMARY
