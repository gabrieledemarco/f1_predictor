name: Import TracingInsights Data

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Year to import (default: all years 2018-2025)'
        required: false
        default: ''
      force:
        description: 'Force re-import'
        required: false
        default: 'false'
  schedule:
    - cron: '0 3 * * 3'

env:
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}

jobs:
  sync-and-import:
    name: Sync & Import TracingInsights to MongoDB
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: MONGODB_URI
    outputs:
      years: ${{ steps.setup-years.outputs.years }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine years to import
        id: setup-years
        env:
          YEAR: ${{ inputs.year || '' }}
        run: |
          if [ -n "$YEAR" ]; then
            echo "years=$YEAR" >> $GITHUB_OUTPUT
            echo "Anno selezionato: $YEAR"
          else
            echo "years=2018,2019,2020,2021,2022,2023,2024,2025" >> $GITHUB_OUTPUT
            echo "Importing all years: 2018-2025"
          fi

      - name: Clone TracingInsights RaceData
        run: |
          git clone --depth 1 https://github.com/TracingInsights/RaceData.git data/racedata
          rm -rf data/racedata/.git
          rm -rf data/racedata/.github
          echo "RaceData clonato: $(find data/racedata -name '*.csv' | wc -l) CSV files"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymongo python-dotenv pandas numpy scipy scikit-learn

      # ========================================================================
      # LAP TIMES
      # ========================================================================
      - name: Cleanup old lap times
        run: python scripts/cleanup_old_lap_times.py
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}

      - name: Import lap times → MongoDB
        run: python scripts/import_tracinginsights.py
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}
          YEAR: ${{ steps.setup-years.outputs.years }}
          FORCE: ${{ inputs.force || 'false' }}

      # ========================================================================
      # QUALIFYING (NEW)
      # ========================================================================
      - name: Import qualifying data → MongoDB
        run: python scripts/import_qualifying.py
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}
          YEARS: ${{ steps.setup-years.outputs.years }}
          FORCE: ${{ inputs.force || 'false' }}

      # ========================================================================
      # PIT STOPS (NEW)
      # ========================================================================
      - name: Import pit stops → MongoDB
        run: python scripts/import_pit_stops.py
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}
          YEARS: ${{ steps.setup-years.outputs.years }}
          FORCE: ${{ inputs.force || 'false' }}

  compute-pace:
    name: Compute Constructor Pace Observations
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: sync-and-import
    environment: MONGODB_URI

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymongo python-dotenv numpy pandas scipy

      - name: Compute pace observations
        run: python scripts/compute_pace_observations.py
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}
          YEAR: ${{ needs.sync-and-import.outputs.years }}

  # ========================================================================
  # TELEMETRY (Sector Times) - Import from TracingInsights GitHub API
  # ========================================================================
  import-telemetry:
    name: Import Telemetry Sector Times
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: sync-and-import
    environment: MONGODB_URI

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymongo python-dotenv

      - name: Import telemetry for 2024
        run: python scripts/import_telemetry.py --year 2024
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}

      - name: Import telemetry for 2023
        run: python scripts/import_telemetry.py --year 2023
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}

      - name: Import telemetry for 2022
        run: python scripts/import_telemetry.py --year 2022
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}

  feature-analysis:
    name: Feature Selection Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [compute-pace, import-telemetry]
    environment: MONGODB_URI

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymongo python-dotenv pandas numpy scipy scikit-learn matplotlib seaborn shap

      - name: Run feature analysis
        run: python scripts/feature_selection_analysis.py
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: feature-analysis-report
          path: |
            docs/feature_selection_analysis.md
            artifacts/feature_*.png

  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [sync-and-import, compute-pace, feature-analysis]
    if: failure()
    
    steps:
      - name: Create failure summary
        run: |
          echo "## Import Failed" >> $GITHUB_STEP_SUMMARY
          echo "TracingInsights import failed. Check logs for details." >> $GITHUB_STEP_SUMMARY