name: Import Circuit Profiles

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 1 1 *'

env:
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}

jobs:
  import-circuit-profiles:
    name: Import Circuit Profiles to MongoDB
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: MONGODB_URI

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymongo python-dotenv

      - name: Import circuit profiles
        run: python scripts/import_circuit_profiles.py
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}
