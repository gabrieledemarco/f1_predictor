name: Import Jolpica F1 Data

on:
  workflow_dispatch:
    inputs:
      from_year:
        description: 'Start year (default: 2018)'
        required: false
        default: '2018'
      to_year:
        description: 'End year (default: current year)'
        required: false
        default: ''
      force:
        description: 'Force re-import (ignore existing)'
        required: false
        default: 'false'
  schedule:
    - cron: '0 2 * * *'

env:
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}

jobs:
  import-races:
    name: Import Races from Jolpica API
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: MONGODB_URI

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pymongo python-dotenv requests

      - name: Determine years to import
        id: years
        run: |
          CURRENT_YEAR=$(date +%Y)
          if [ -z "$FROM_YEAR" ]; then
            FROM_YEAR="2018"
          fi
          if [ -z "$TO_YEAR" ]; then
            TO_YEAR="$CURRENT_YEAR"
          fi
          echo "from_year=$FROM_YEAR" >> $GITHUB_OUTPUT
          echo "to_year=$TO_YEAR" >> $GITHUB_OUTPUT
        env:
          FROM_YEAR: ${{ inputs.from_year || '2018' }}
          TO_YEAR: ${{ inputs.to_year || '' }}

      - name: Import races to MongoDB
        run: python scripts/import_jolpica.py
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}
          FROM_YEAR: ${{ steps.years.outputs.from_year }}
          TO_YEAR: ${{ steps.years.outputs.to_year }}
          FORCE: ${{ inputs.force || 'false' }}

      - name: Report import results
        if: always()
        run: |
          echo "## Import Results" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Years Imported | ${{ steps.years.outputs.from_year }} - ${{ steps.years.outputs.to_year }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> $GITHUB_STEP_SUMMARY

  import-standings:
    name: Import Driver Standings
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: import-races
    continue-on-error: true  # scripts/import_standings.py non ancora implementato
    environment: MONGODB_URI
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymongo python-dotenv requests

      - name: Import standings
        run: python scripts/import_standings.py
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_DB: ${{ vars.MONGO_DB || 'betbreaker' }}

  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [import-races, import-standings]
    if: failure()
    
    steps:
      - name: Create failure summary
        run: |
          echo "## Import Failed" >> $GITHUB_STEP_SUMMARY
          echo "One or more import jobs failed. Check logs for details." >> $GITHUB_STEP_SUMMARY
